services:
  # ============================================
  # PostgreSQL — 主数据库
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: fq-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-football_quant}
      POSTGRES_USER: ${POSTGRES_USER:-football}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-football}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis — 缓存 + Celery 消息队列
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: fq-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============================================
  # FastAPI — 后端 API 服务
  # ============================================
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: fq-backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./engine:/app/engine
      - ./data:/app/data
      - ./models_store:/app/models_store
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ============================================
  # Celery Worker — 异步任务
  # ============================================
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: fq-worker
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
      - ./engine:/app/engine
      - ./data:/app/data
      - ./models_store:/app/models_store
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ============================================
  # Celery Beat — 定时任务调度
  # ============================================
  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: fq-beat
    command: celery -A tasks.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ============================================
  # Next.js — 前端
  # ============================================
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: fq-frontend
    command: pnpm dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      - backend

  # ============================================
  # MLflow — 实验追踪（可选）
  # ============================================
  mlflow:
    image: python:3.11-slim
    container_name: fq-mlflow
    command: >
      sh -c "pip install mlflow psycopg2-binary &&
             mlflow server
             --backend-store-uri postgresql://${POSTGRES_USER:-football}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/mlflow
             --default-artifact-root /mlflow-artifacts
             --host 0.0.0.0 --port 5000"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow-artifacts
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - full

  # ============================================
  # Nginx — 反向代理（生产模式）
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: fq-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    profiles:
      - production

volumes:
  postgres_data:
  mlflow_data:
